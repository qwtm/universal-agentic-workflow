# stages.yaml — uwf-project_manager persona stage definitions
# Loaded by stage-tracker.mjs to drive gate enforcement and execution tracking.
# Gate conditions are evaluated declaratively by the central stage-tracker script.
#
# Template variables available in paths:
#   {{output_path}}  — resolved output-path (default: ./tmp/workflow-artifacts)
#   {{cwd}}          — process.cwd()
#
# inputs/outputs use the same template variables and support glob patterns.
# The orchestrator resolves these and passes them to the stage agent at invocation time.

workflow: project_manager
artifact_prefix: project
output_path: ./tmp/workflow-artifacts

stages:

  - name: intake
    stage_type: intake
    traits:
      - project_manager
    max_retries: 2
    on_gate_failure: retry
    run_as_subagent: true
    advances_phase_to: intake
    inputs: []
    outputs:
      - "{{output_path}}/project-intake.md"
    gated: true
    gate:
      checks:
        - type: require_non_empty
          path: "{{output_path}}/project-intake.md"
          label: "project-intake.md"
        - type: require_contains
          path: "{{output_path}}/project-intake.md"
          text: "Goal"
          label: "project-intake.md"
        - type: require_contains
          path: "{{output_path}}/project-intake.md"
          text: "Non-goals"
          label: "project-intake.md"
        - type: require_contains
          path: "{{output_path}}/project-intake.md"
          text: "Constraints"
          label: "project-intake.md"
        - type: require_contains
          path: "{{output_path}}/project-intake.md"
          text: "Success metrics"
          label: "project-intake.md"
        - type: require_contains
          path: "{{output_path}}/project-intake.md"
          text: "Stakeholders"
          label: "project-intake.md"
        - type: require_contains
          path: "{{output_path}}/project-intake.md"
          text: "Target environment"
          label: "project-intake.md"
        - type: require_contains
          path: "{{output_path}}/project-intake.md"
          text: "Risk tolerance"
          label: "project-intake.md"
        - type: require_contains
          path: "{{output_path}}/project-intake.md"
          text: "Work-breakdown strategy"
          label: "project-intake.md"

  - name: discovery
    stage_type: discovery
    traits:
      - project_manager
    max_retries: 2
    on_gate_failure: retry
    run_as_subagent: true
    advances_phase_to: discovery
    inputs:
      - "{{output_path}}/project-intake.md"
    outputs:
      - "{{output_path}}/project-discovery.md"
    gated: true
    gate:
      checks:
        - type: require_non_empty
          path: "{{output_path}}/project-discovery.md"
          label: "project-discovery.md"

  - name: requirements
    agent: uwf-core-requirements
    max_retries: 2
    on_gate_failure: retry
    run_as_subagent: true
    inputs:
      - "{{output_path}}/project-discovery.md"
    outputs:
      - "{{output_path}}/project-requirements.md"
    gated: true
    gate:
      checks:
        - type: require_non_empty
          path: "{{output_path}}/project-requirements.md"
          label: "project-requirements.md"

  - name: adr
    agent: uwf-core-adr
    max_retries: 2
    on_gate_failure: retry
    run_as_subagent: true
    inputs:
      - "{{output_path}}/project-requirements.md"
    outputs:
      - "{{cwd}}/docs/adr/ADR-[0-9]*.md"
    gated: true
    conditional: true
    condition:
      type: file_contains
      path: "{{output_path}}/project-requirements.md"
      text: "ADR:"
    gate:
      checks:
        - type: require_files_with_prefix
          dir: "{{cwd}}/docs/adr"
          prefix: "ADR-"
          label: "ADR-*.md"

  - name: risk-plan
    agent: uwf-core-risk-planner
    max_retries: 2
    on_gate_failure: retry
    run_as_subagent: true
    inputs:
      - "{{output_path}}/project-intake.md"
      - "{{output_path}}/project-discovery.md"
      - "{{output_path}}/project-requirements.md"
      - "{{cwd}}/docs/adr/ADR-[0-9]*.md"
    outputs:
      - "{{output_path}}/project-risk-plan.md"
    gated: true
    gate:
      checks:
        - type: require_non_empty
          path: "{{output_path}}/project-risk-plan.md"
          label: "project-risk-plan.md"

  - name: security-plan
    agent: uwf-core-security-plan
    max_retries: 2
    on_gate_failure: retry
    run_as_subagent: true
    inputs:
      - "{{output_path}}/project-requirements.md"
      - "{{output_path}}/project-risk-plan.md"
    outputs:
      - "{{output_path}}/project-security-plan.md"
    gated: true
    conditional: true
    condition:
      type: file_contains_any
      path: "{{output_path}}/project-requirements.md"
      texts:
        - "security-sensitive: true"
        - "SECURITY:"
        - "security: true"
    gate:
      checks:
        - type: require_non_empty
          path: "{{output_path}}/project-security-plan.md"
          label: "project-security-plan.md"

  - name: test-plan
    agent: uwf-core-test-planner
    max_retries: 2
    on_gate_failure: retry
    run_as_subagent: true
    inputs:
      - "{{output_path}}/project-intake.md"
      - "{{output_path}}/project-discovery.md"
      - "{{output_path}}/project-requirements.md"
    outputs:
      - "{{output_path}}/project-test-plan.md"
    gated: true
    gate:
      checks:
        - type: require_non_empty
          path: "{{output_path}}/project-test-plan.md"
          label: "project-test-plan.md"

  - name: blueprint
    agent: uwf-core-blueprint
    max_retries: 2
    on_gate_failure: retry
    run_as_subagent: true
    inputs:
      - "{{output_path}}/project-intake.md"
      - "{{output_path}}/project-discovery.md"
      - "{{output_path}}/project-requirements.md"
      - "{{cwd}}/docs/adr/ADR-[0-9]*.md"
      - "{{output_path}}/project-risk-plan.md"
      - "{{output_path}}/project-security-plan.md"
      - "{{output_path}}/project-test-plan.md"
    outputs:
      - "{{output_path}}/project-blueprint.md"
      - "{{output_path}}/project-br.json"
    gated: true
    gate:
      checks:
        - type: require_non_empty
          path: "{{output_path}}/project-blueprint.md"
          label: "project-blueprint.md"
        - type: require_non_empty
          path: "{{output_path}}/project-br.json"
          label: "project-br.json"

  - name: timeline-planning
    agent: uwf-project_manager-timeline-planner
    max_retries: 2
    on_gate_failure: retry
    run_as_subagent: true
    advances_phase_to: planning
    inputs:
      - "{{output_path}}/project-intake.md"
      - "{{output_path}}/project-discovery.md"
    outputs:
      - "{{output_path}}/issues-backlog.md"
      - "{{output_path}}/project-roadmap.md"
    gated: true
    gate:
      checks:
        - type: require_non_empty
          path: "{{output_path}}/issues-backlog.md"
          label: "issues-backlog.md"
        - type: require_non_empty
          path: "{{output_path}}/project-roadmap.md"
          label: "project-roadmap.md"

  - name: review
    agent: uwf-project_manager-reviewer
    max_retries: 3
    on_gate_failure: retry
    run_as_subagent: true
    inputs:
      - "{{output_path}}/issues-backlog.md"
      - "{{output_path}}/project-roadmap.md"
    outputs:
      - "{{output_path}}/project-review.md"
    gated: true
    gate:
      checks:
        - type: require_non_empty
          path: "{{output_path}}/project-review.md"
          label: "project-review.md"
        - type: require_contains
          path: "{{output_path}}/project-review.md"
          text: "verdict: approved"
          label: "project-review.md"

  - name: issue-state-population
    agent: uwf-core-project-tracking
    max_retries: 2
    on_gate_failure: retry
    run_as_subagent: true
    inputs:
      - "{{output_path}}/issues-backlog.md"
    outputs: []
    gated: true
    gate:
      checks:
        - type: run_script
          cmd: "node .github/skills/uwf-local-tracking/issues.mjs list --status open | node -e \"const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); process.exit(d.count > 0 ? 0 : 1);\""
          label: "SQLite issues table has open records"

  - name: acceptance
    agent: uwf-core-acceptance
    max_retries: 2
    on_gate_failure: retry
    run_as_subagent: true
    advances_phase_to: acceptance
    inputs:
      - "{{output_path}}/project-review.md"
    outputs:
      - "{{output_path}}/project-acceptance.md"
    gated: true
    gate:
      checks:
        - type: require_non_empty
          path: "{{output_path}}/project-acceptance.md"
          label: "project-acceptance.md"
        - type: require_contains
          path: "{{output_path}}/project-acceptance.md"
          text: "verdict: approved"
          label: "project-acceptance.md"

  - name: snapshot
    agent: uwf-core-snapshot
    max_retries: 2
    on_gate_failure: retry
    run_as_subagent: true
    advances_phase_to: snapshot
    inputs:
      - "{{output_path}}/project-acceptance.md"
      - "{{output_path}}/project-br.json"
      - "{{output_path}}/project-blueprint.md"
    outputs:
      - "{{output_path}}/project-drs.json"
      - "{{output_path}}/project-br.json"
      - "{{output_path}}/uwf-changelog.md"
    gated: true
    gate:
      checks:
        - type: require_non_empty
          path: "{{output_path}}/project-drs.json"
          label: "project-drs.json"
        - type: require_contains
          path: "{{output_path}}/project-drs.json"
          text: "divergence_log"
          label: "project-drs.json divergence_log field present"
        - type: require_non_empty
          path: "{{output_path}}/project-br.json"
          label: "project-br.json (build record updated)"
        - type: require_non_empty
          path: "{{output_path}}/uwf-changelog.md"
          label: "uwf-changelog.md (changelog updated)"

  - name: retro
    agent: uwf-core-retro
    max_retries: 1
    on_gate_failure: skip
    run_as_subagent: true
    advances_phase_to: closed
    inputs: []
    outputs:
      - "{{output_path}}/project-retro.md"
    gated: false
