# stages.yaml — uwf-solutions_architect persona stage definitions
# Loaded by stage-tracker.mjs to drive gate enforcement and execution tracking.
# Gate conditions are evaluated declaratively by the central stage-tracker script.
#
# Template variables available in paths:
#   {{output_path}}  — resolved output-path (default: ./tmp/workflow-artifacts)
#   {{cwd}}          — process.cwd()
#
# inputs/outputs use the same template variables and support glob patterns.
# The orchestrator resolves these and passes them to the stage agent at invocation time.

workflow: solutions_architect
artifact_prefix: design
output_path: ./tmp/workflow-artifacts

stages:

  - name: intake
    agent: uwf-solutions_architect-design-planner
    max_retries: 2
    on_gate_failure: retry
    run_as_subagent: true
    advances_phase_to: intake
    inputs: []
    outputs:
      - "{{output_path}}/design-intake.md"
    gated: true
    gate:
      checks:
        - type: require_non_empty
          path: "{{output_path}}/design-intake.md"
          label: "design-intake.md"
        - type: require_contains
          path: "{{output_path}}/design-intake.md"
          text: "Architectural Goal"
          label: "design-intake.md contains Architectural Goal"
        - type: require_contains
          path: "{{output_path}}/design-intake.md"
          text: "System Boundaries"
          label: "design-intake.md contains System Boundaries"
        - type: require_contains
          path: "{{output_path}}/design-intake.md"
          text: "Quality Attributes"
          label: "design-intake.md contains Quality Attributes"
        - type: require_contains
          path: "{{output_path}}/design-intake.md"
          text: "Constraints"
          label: "design-intake.md contains Constraints"

  - name: discovery
    agent: uwf-core-discovery
    max_retries: 2
    on_gate_failure: retry
    run_as_subagent: true
    advances_phase_to: discovery
    inputs:
      - "{{output_path}}/design-intake.md"
    outputs:
      - "{{output_path}}/design-discovery.md"
    gated: true
    gate:
      checks:
        - type: require_non_empty
          path: "{{output_path}}/design-discovery.md"
          label: "design-discovery.md"

  - name: requirements
    agent: uwf-core-requirements
    max_retries: 2
    on_gate_failure: retry
    run_as_subagent: true
    inputs:
      - "{{output_path}}/design-discovery.md"
    outputs:
      - "{{output_path}}/design-requirements.md"
    gated: true
    gate:
      checks:
        - type: require_non_empty
          path: "{{output_path}}/design-requirements.md"
          label: "design-requirements.md"

  - name: adr
    agent: uwf-core-adr
    max_retries: 2
    on_gate_failure: retry
    run_as_subagent: true
    inputs:
      - "{{output_path}}/design-requirements.md"
    outputs:
      - "{{cwd}}/docs/adr/ADR-[0-9]*.md"
    gated: true
    conditional: true
    condition:
      type: file_contains
      path: "{{output_path}}/design-requirements.md"
      text: "ADR:"
    gate:
      checks:
        - type: require_files_with_prefix
          dir: "{{cwd}}/docs/adr"
          prefix: "ADR-"
          label: "ADR-*.md"

  - name: risk-plan
    agent: uwf-core-risk-planner
    max_retries: 2
    on_gate_failure: retry
    run_as_subagent: true
    inputs:
      - "{{output_path}}/design-intake.md"
      - "{{output_path}}/design-discovery.md"
      - "{{output_path}}/design-requirements.md"
      - "{{cwd}}/docs/adr/ADR-[0-9]*.md"
    outputs:
      - "{{output_path}}/design-risk-plan.md"
    gated: true
    gate:
      checks:
        - type: require_non_empty
          path: "{{output_path}}/design-risk-plan.md"
          label: "design-risk-plan.md"

  - name: security-plan
    agent: uwf-core-security-plan
    max_retries: 2
    on_gate_failure: retry
    run_as_subagent: true
    inputs:
      - "{{output_path}}/design-requirements.md"
      - "{{output_path}}/design-risk-plan.md"
    outputs:
      - "{{output_path}}/design-security-plan.md"
    gated: true
    conditional: true
    condition:
      type: file_contains_any
      path: "{{output_path}}/design-requirements.md"
      texts:
        - "security-sensitive: true"
        - "SECURITY:"
        - "security: true"
    gate:
      checks:
        - type: require_non_empty
          path: "{{output_path}}/design-security-plan.md"
          label: "design-security-plan.md"

  - name: test-plan
    agent: uwf-core-test-planner
    max_retries: 2
    on_gate_failure: retry
    run_as_subagent: true
    inputs:
      - "{{output_path}}/design-intake.md"
      - "{{output_path}}/design-discovery.md"
      - "{{output_path}}/design-requirements.md"
    outputs:
      - "{{output_path}}/design-test-plan.md"
    gated: true
    gate:
      checks:
        - type: require_non_empty
          path: "{{output_path}}/design-test-plan.md"
          label: "design-test-plan.md"

  - name: blueprint
    agent: uwf-core-blueprint
    max_retries: 2
    on_gate_failure: retry
    run_as_subagent: true
    inputs:
      - "{{output_path}}/design-intake.md"
      - "{{output_path}}/design-discovery.md"
      - "{{output_path}}/design-requirements.md"
      - "{{cwd}}/docs/adr/ADR-[0-9]*.md"
      - "{{output_path}}/design-risk-plan.md"
      - "{{output_path}}/design-security-plan.md"
      - "{{output_path}}/design-test-plan.md"
    outputs:
      - "{{output_path}}/design-blueprint.md"
      - "{{output_path}}/design-br.json"
    gated: true
    gate:
      checks:
        - type: require_non_empty
          path: "{{output_path}}/design-blueprint.md"
          label: "design-blueprint.md"
        - type: require_non_empty
          path: "{{output_path}}/design-br.json"
          label: "design-br.json"

  - name: design-planning
    agent: uwf-solutions_architect-design-planner
    max_retries: 2
    on_gate_failure: retry
    run_as_subagent: true
    advances_phase_to: planning
    inputs:
      - "{{output_path}}/design-intake.md"
      - "{{output_path}}/design-discovery.md"
      - "{{output_path}}/design-requirements.md"
      - "{{cwd}}/docs/adr/ADR-[0-9]*.md"
      - "{{output_path}}/design-risk-plan.md"
      - "{{output_path}}/design-security-plan.md"
      - "{{output_path}}/design-test-plan.md"
    outputs:
      - "{{output_path}}/design-sdd.md"
    gated: true
    gate:
      checks:
        - type: require_non_empty
          path: "{{output_path}}/design-sdd.md"
          label: "design-sdd.md"
        - type: require_contains
          path: "{{output_path}}/design-sdd.md"
          text: "## Components"
          label: "design-sdd.md contains Components section"
        - type: require_contains
          path: "{{output_path}}/design-sdd.md"
          text: "## Interface Contracts"
          label: "design-sdd.md contains Interface Contracts section"
        - type: require_contains
          path: "{{output_path}}/design-sdd.md"
          text: "## Non-Functional Requirements"
          label: "design-sdd.md contains Non-Functional Requirements section"
        - type: require_contains
          path: "{{output_path}}/design-sdd.md"
          text: "## Traceability"
          label: "design-sdd.md contains Traceability section"

  - name: review
    agent: uwf-solutions_architect-reviewer
    max_retries: 3
    on_gate_failure: retry
    run_as_subagent: true
    inputs:
      - "{{output_path}}/design-sdd.md"
      - "{{cwd}}/docs/adr/ADR-[0-9]*.md"
    outputs:
      - "{{output_path}}/design-review.md"
    gated: true
    gate:
      checks:
        - type: require_non_empty
          path: "{{output_path}}/design-review.md"
          label: "design-review.md"
        - type: require_contains
          path: "{{output_path}}/design-review.md"
          text: "verdict: approved"
          label: "design-review.md"

  - name: acceptance
    agent: uwf-core-acceptance
    max_retries: 2
    on_gate_failure: retry
    run_as_subagent: true
    advances_phase_to: acceptance
    inputs:
      - "{{output_path}}/design-review.md"
    outputs:
      - "{{output_path}}/design-acceptance.md"
    gated: true
    gate:
      checks:
        - type: require_non_empty
          path: "{{output_path}}/design-acceptance.md"
          label: "design-acceptance.md"
        - type: require_contains
          path: "{{output_path}}/design-acceptance.md"
          text: "verdict: approved"
          label: "design-acceptance.md"

  - name: snapshot
    agent: uwf-core-snapshot
    max_retries: 2
    on_gate_failure: retry
    run_as_subagent: true
    advances_phase_to: snapshot
    inputs:
      - "{{output_path}}/design-acceptance.md"
      - "{{output_path}}/design-br.json"
      - "{{output_path}}/design-blueprint.md"
    outputs:
      - "{{output_path}}/design-drs.json"
      - "{{output_path}}/design-br.json"
      - "{{output_path}}/uwf-changelog.md"
    gated: true
    gate:
      checks:
        - type: require_non_empty
          path: "{{output_path}}/design-drs.json"
          label: "design-drs.json"
        - type: require_contains
          path: "{{output_path}}/design-drs.json"
          text: "divergence_log"
          label: "design-drs.json divergence_log field present"
        - type: require_non_empty
          path: "{{output_path}}/design-br.json"
          label: "design-br.json (build record updated)"
        - type: require_non_empty
          path: "{{output_path}}/uwf-changelog.md"
          label: "uwf-changelog.md (changelog updated)"

  - name: retro
    agent: uwf-core-retro
    max_retries: 1
    on_gate_failure: skip
    run_as_subagent: true
    advances_phase_to: closed
    inputs: []
    outputs:
      - "{{output_path}}/design-retro.md"
    gated: false
