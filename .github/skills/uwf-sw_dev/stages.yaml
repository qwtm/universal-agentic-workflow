# stages.yaml — uwf-sw_dev persona stage definitions
# Loaded by stage-tracker.mjs to drive gate enforcement and execution tracking.
# Gate conditions are evaluated declaratively by the central stage-tracker script.
#
# Template variables available in paths:
#   {{output_path}}  — resolved output-path (default: ./tmp/workflow-artifacts)
#   {{cwd}}          — process.cwd()
#
# inputs/outputs use the same template variables and support glob patterns.
# The orchestrator resolves these and passes them to the stage agent at invocation time.

workflow: sw_dev
artifact_prefix: issues
output_path: ./tmp/workflow-artifacts

stages:

  - name: intake
    agent: uwf-sw_dev-intake
    max_retries: 2
    on_gate_failure: retry
    run_as_subagent: true
    advances_phase_to: intake
    inputs: []
    outputs:
      - "{{output_path}}/issues-intake.md"
    gated: true
    gate:
      checks:
        - type: require_non_empty
          path: "{{output_path}}/issues-intake.md"
          label: "issues-intake.md"

  - name: discovery
    agent: uwf-core-discovery
    max_retries: 2
    on_gate_failure: retry
    run_as_subagent: true
    advances_phase_to: discovery
    inputs:
      - "{{output_path}}/issues-intake.md"
    outputs:
      - "{{output_path}}/issues-discovery.md"
    gated: true
    gate:
      checks:
        - type: require_non_empty
          path: "{{output_path}}/issues-discovery.md"
          label: "issues-discovery.md"

  - name: requirements
    agent: uwf-core-requirements
    max_retries: 2
    on_gate_failure: retry
    run_as_subagent: true
    inputs:
      - "{{output_path}}/issues-discovery.md"
    outputs:
      - "{{output_path}}/issues-requirements.md"
    gated: true
    gate:
      checks:
        - type: require_non_empty
          path: "{{output_path}}/issues-requirements.md"
          label: "issues-requirements.md"

  - name: adr
    agent: uwf-core-adr
    max_retries: 2
    on_gate_failure: retry
    run_as_subagent: true
    inputs:
      - "{{output_path}}/issues-requirements.md"
    outputs:
      - "{{cwd}}/docs/adr/ADR-[0-9]*.md"
    gated: true
    conditional: true
    condition:
      type: file_contains
      path: "{{output_path}}/issues-requirements.md"
      text: "ADR:"
    gate:
      checks:
        - type: require_files_with_prefix
          dir: "{{cwd}}/docs/adr"
          prefix: "ADR-"
          label: "ADR-*.md"

  - name: security-plan
    agent: uwf-core-security-plan
    max_retries: 2
    on_gate_failure: retry
    run_as_subagent: true
    inputs:
      - "{{output_path}}/issues-requirements.md"
    outputs:
      - "{{output_path}}/issues-security-plan.md"
    gated: true
    conditional: true
    condition:
      type: file_contains_any
      path: "{{output_path}}/issues-requirements.md"
      texts:
        - "security-sensitive: true"
        - "SECURITY:"
        - "security: true"
    gate:
      checks:
        - type: require_non_empty
          path: "{{output_path}}/issues-security-plan.md"
          label: "issues-security-plan.md"

  - name: test-plan
    agent: uwf-core-test-planner
    max_retries: 2
    on_gate_failure: retry
    run_as_subagent: true
    inputs:
      - "{{output_path}}/issues-intake.md"
      - "{{output_path}}/issues-discovery.md"
      - "{{output_path}}/issues-requirements.md"
    outputs:
      - "{{output_path}}/issues-test-plan.md"
    gated: true
    gate:
      checks:
        - type: require_non_empty
          path: "{{output_path}}/issues-test-plan.md"
          label: "issues-test-plan.md"

  - name: blueprint
    agent: uwf-core-blueprint
    max_retries: 2
    on_gate_failure: retry
    run_as_subagent: true
    inputs:
      - "{{output_path}}/issues-intake.md"
      - "{{output_path}}/issues-discovery.md"
      - "{{output_path}}/issues-requirements.md"
      - "{{cwd}}/docs/adr/ADR-[0-9]*.md"
      - "{{output_path}}/issues-security-plan.md"
      - "{{output_path}}/issues-test-plan.md"
    outputs:
      - "{{output_path}}/issues-blueprint.md"
      - "{{output_path}}/issues-br.json"
    gated: true
    gate:
      checks:
        - type: require_non_empty
          path: "{{output_path}}/issues-blueprint.md"
          label: "issues-blueprint.md"
        - type: require_non_empty
          path: "{{output_path}}/issues-br.json"
          label: "issues-br.json"

  - name: work-plan
    agent: uwf-sw_dev-work-planner
    max_retries: 2
    on_gate_failure: retry
    run_as_subagent: true
    advances_phase_to: planning
    inputs:
      - "{{output_path}}/issues-intake.md"
      - "{{output_path}}/issues-discovery.md"
      - "{{output_path}}/issues-requirements.md"
      - "{{output_path}}/issues-test-plan.md"
      - "{{cwd}}/docs/adr/ADR-[0-9]*.md"
    outputs:
      - "{{output_path}}/issues-plan.md"
    gated: true
    gate:
      checks:
        - type: require_non_empty
          path: "{{output_path}}/issues-plan.md"
          label: "issues-plan.md"

  - name: implementation
    agent: uwf-issue-implementer
    max_retries: 1
    on_gate_failure: retry
    run_as_subagent: true
    advances_phase_to: execution
    inputs:
      - "{{output_path}}/issues-plan.md"
      - "{{output_path}}/issues-test-plan.md"
    outputs: []
    gated: true
    gate:
      checks:
        - type: require_non_empty
          path: "{{output_path}}/issues-plan.md"
          label: "issues-plan.md"

  - name: review
    agent: uwf-sw_dev-reviewer
    max_retries: 3
    on_gate_failure: retry
    run_as_subagent: true
    inputs:
      - "{{output_path}}/issues-plan.md"
    outputs:
      - "{{output_path}}/issues-review.md"
    gated: true
    gate:
      checks:
        - type: require_non_empty
          path: "{{output_path}}/issues-review.md"
          label: "issues-review.md"
        - type: require_contains
          path: "{{output_path}}/issues-review.md"
          text: "verdict: approved"
          label: "issues-review.md"

  - name: technical-writing
    agent: uwf-core-technical-writer
    max_retries: 1
    on_gate_failure: abort
    run_as_subagent: true
    inputs:
      - "{{output_path}}/issues-review.md"
    outputs: []
    gated: false

  - name: acceptance
    agent: uwf-core-acceptance
    max_retries: 2
    on_gate_failure: retry
    run_as_subagent: true
    advances_phase_to: acceptance
    inputs:
      - "{{output_path}}/issues-review.md"
    outputs:
      - "{{output_path}}/issues-acceptance.md"
    gated: true
    gate:
      checks:
        - type: require_non_empty
          path: "{{output_path}}/issues-acceptance.md"
          label: "issues-acceptance.md"
        - type: require_contains
          path: "{{output_path}}/issues-acceptance.md"
          text: "verdict: approved"
          label: "issues-acceptance.md"

  - name: retro
    agent: uwf-core-retro
    max_retries: 1
    on_gate_failure: skip
    run_as_subagent: true
    advances_phase_to: closed
    inputs: []
    outputs:
      - "{{output_path}}/issues-retro.md"
    gated: false
