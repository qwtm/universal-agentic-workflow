# issues-schema.yaml
# Defines the SQLite table shape for individual work items (issues).
# Loaded by state.mjs on first initialization to CREATE TABLE IF NOT EXISTS.
# Add, remove, or rename columns here to change the issues table structure.

table: issues
description: "Tracks individual work items across milestones and sprints"
columns:
  - name: id
    type: TEXT
    primary_key: true
  - name: title
    type: TEXT
    not_null: true
  - name: status
    type: TEXT
    not_null: true
    default: "open"
  - name: phase
    type: TEXT
  - name: milestone
    type: TEXT
  - name: sprint
    type: TEXT
  - name: description
    type: TEXT
  - name: assigned_agent
    type: TEXT
  - name: risk
    type: TEXT
  - name: unknowns
    type: TEXT
  - name: depends_on
    type: TEXT
  - name: parallel
    type: INTEGER
    default: 0
  - name: comments
    type: TEXT
  - name: created_at
    type: TEXT
    not_null: true
  - name: updated_at
    type: TEXT
    not_null: true
