# workflow-schema.yaml
# Defines the SQLite tables that track overall workflow phase, status, and history.
# Loaded by state.mjs on first initialization to CREATE TABLE IF NOT EXISTS.

tables:
  workflow_state:
    description: "Single-row table (id=1) tracking the active workflow phase and status"
    columns:
      - name: id
        type: INTEGER
        primary_key: true
      - name: phase
        type: TEXT
        not_null: true
        default: "idea"
      - name: mode
        type: TEXT
      - name: status
        type: TEXT
        not_null: true
        default: "idle"
      - name: current_agent
        type: TEXT
      - name: artifact_path
        type: TEXT
        not_null: true
        default: "./tmp/workflow-artifacts"
      - name: ready_for_implementation
        type: INTEGER
        not_null: true
        default: 0
      - name: model_profile
        type: TEXT
      - name: model_name
        type: TEXT

  workflow_history:
    description: "Append-only audit log of phase transitions, status changes, and notes"
    columns:
      - name: id
        type: INTEGER
        primary_key: true
        autoincrement: true
      - name: ts
        type: TEXT
        not_null: true
      - name: from_phase
        type: TEXT
      - name: to_phase
        type: TEXT
      - name: agent
        type: TEXT
      - name: note
        type: TEXT
