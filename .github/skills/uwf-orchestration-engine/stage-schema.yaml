# stage-schema.yaml
# Defines the SQLite tables used by stage-tracker.mjs.
# Loaded on first run to CREATE TABLE IF NOT EXISTS.

tables:
  stage_runs:
    description: "Tracks execution state of each stage per workflow run"
    columns:
      - name: id
        type: INTEGER
        primary_key: true
        autoincrement: true
      - name: workflow
        type: TEXT
        not_null: true
      - name: stage
        type: TEXT
        not_null: true
      - name: status
        type: TEXT
        not_null: true
        default: "pending"
      - name: retry_count
        type: INTEGER
        not_null: true
        default: 0
      - name: run_as_subagent
        type: INTEGER
        not_null: true
        default: 1
      - name: started_at
        type: TEXT
      - name: completed_at
        type: TEXT
      - name: gate_result
        type: TEXT
      - name: notes
        type: TEXT

  stage_history:
    description: "Append-only log of all stage status transitions"
    columns:
      - name: id
        type: INTEGER
        primary_key: true
        autoincrement: true
      - name: workflow
        type: TEXT
        not_null: true
      - name: stage
        type: TEXT
        not_null: true
      - name: from_status
        type: TEXT
      - name: to_status
        type: TEXT
        not_null: true
      - name: ts
        type: TEXT
        not_null: true
      - name: notes
        type: TEXT
